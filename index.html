<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Lender Comparison Dashboard</title>
    
    <!-- Fonts & Tailwind CSS for Premium Styling -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js for Visualizations -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- PapaParse for Google Sheet CSV Reading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
        .slider-custom { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 5px; background: #e2e8f0; outline: none; }
        .slider-custom::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #4f46e5; cursor: pointer; transition: 0.2s; }
        .slider-custom::-webkit-slider-thumb:hover { background: #4338ca; transform: scale(1.1); }
        /* Scrollbar styling for lender list */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 antialiased p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center glass-card p-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-900">Lender Repayment Strategy</h1>
                <p class="text-sm text-slate-500 mt-1">Compare Accelerated vs Annualized strategies instantly.</p>
            </div>
            <button onclick="shareDashboard()" class="mt-4 md:mt-0 px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold rounded-lg shadow transition-colors flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-5.368m0 5.368l5.662 3.397a3 3 0 10.982-1.74m-6.644-1.657l5.662-3.397a3 3 0 10-.982-1.74m6.644 1.657a3 3 0 110-5.368m0 5.368a3 3 0 110-5.368"></path></svg>
                Copy Report Summary
            </button>
        </div>

        <!-- Main Controls Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Setup Parameters -->
            <div class="glass-card p-6 lg:col-span-1 space-y-6">
                <h2 class="text-lg font-semibold border-b pb-2">Global Parameters</h2>
                
                <!-- Loan Amount -->
                <div>
                    <div class="flex justify-between mb-1">
                        <label class="text-sm font-medium text-slate-700">Loan Amount</label>
                        <span id="loanAmtDisplay" class="text-sm font-bold text-indigo-600">$500,000</span>
                    </div>
                    <input type="range" id="loanAmt" min="100000" max="2000000" step="10000" value="500000" class="slider-custom" oninput="updateUI()">
                </div>

                <!-- Loan Term -->
                <div>
                    <div class="flex justify-between mb-1">
                        <label class="text-sm font-medium text-slate-700">Loan Term (Years)</label>
                        <span id="loanTermDisplay" class="text-sm font-bold text-indigo-600">30</span>
                    </div>
                    <input type="range" id="loanTerm" min="5" max="40" step="1" value="30" class="slider-custom" oninput="updateUI()">
                </div>

                <!-- Repayment Frequency -->
                <div>
                    <label class="text-sm font-medium text-slate-700 mb-1 block">Repayment Frequency</label>
                    <select id="freqSelect" class="w-full border-slate-300 rounded-lg p-2.5 text-sm bg-slate-50 border outline-none focus:ring-2 focus:ring-indigo-500 transition-shadow" onchange="updateUI()">
                        <option value="Monthly">Monthly</option>
                        <option value="Fortnightly" selected>Fortnightly</option>
                        <option value="Weekly">Weekly</option>
                    </select>
                </div>
            </div>

            <!-- Lender Selection & Inputs -->
            <div class="glass-card p-6 lg:col-span-2">
                <h2 class="text-lg font-semibold border-b pb-2 mb-4">Select Lenders</h2>
                <div id="loading" class="text-sm font-medium text-indigo-600 animate-pulse">Fetching live data from Google Sheets...</div>
                
                <div id="lendersContainer" class="space-y-4 hidden h-[260px] overflow-y-auto pr-2">
                    <!-- Dynamic Lender Cards Injected Here -->
                </div>
            </div>
        </div>

        <!-- Visualizations -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Amortization Area Chart -->
            <div class="glass-card p-6">
                <h3 class="text-md font-semibold text-slate-800 mb-4">Principal vs. Interest (Balance Timeline)</h3>
                <div class="relative h-64 w-full">
                    <canvas id="amortizationChart"></canvas>
                </div>
            </div>

            <!-- Time Saved Bar Chart -->
            <div class="glass-card p-6">
                <h3 class="text-md font-semibold text-slate-800 mb-4">Time to Payoff (Years)</h3>
                <div class="relative h-64 w-full">
                    <canvas id="timeChart"></canvas>
                </div>
            </div>
        </div>

    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-900 text-white px-6 py-3 rounded-lg shadow-lg transform transition-transform duration-300 translate-y-20 opacity-0 z-50">
        Summary copied to clipboard!
    </div>

    <script>
        // === LIVE GOOGLE SHEET CSV URL ===
        const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSwLQC98juKWTkrk2kPRjPPEoqfaDqAaICJwKBWztGK-bHh86habX4gmbmF7lmH9dgNFYn2cLylOAc8/pub?gid=0&single=true&output=csv"; 
        
        // Fallback data in case the sheet URL gets blocked by CORS or sharing permissions change
        const fallbackData = [
            { "Lender Name": "CBA (Demo)", "Repayment Type": "Annualized" },
            { "Lender Name": "Westpac (Demo)", "Repayment Type": "Accelerated" },
            { "Lender Name": "NAB (Demo)", "Repayment Type": "Annualized" },
            { "Lender Name": "Macquarie (Demo)", "Repayment Type": "Accelerated" },
            { "Lender Name": "ANZ (Demo)", "Repayment Type": "Annualized" }
        ];

        let lendersData = [];
        let amortizationChartInst = null;
        let timeChartInst = null;

        // Initialize App & Fetch Live Data
        async function init() {
            try {
                let response;
                
                // First attempt: Try standard fetch (works when hosted on a real server)
                try {
                    response = await fetch(GOOGLE_SHEET_CSV_URL);
                } catch (e) {
                    console.log("Direct fetch blocked (likely due to local file:// execution). Trying proxy...");
                }
                
                // Second attempt: Use a safe CORS proxy (solves the issue when opening locally from your computer)
                if (!response || !response.ok) {
                    const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(GOOGLE_SHEET_CSV_URL);
                    response = await fetch(proxyUrl);
                }

                if (!response || !response.ok) throw new Error("Could not reach Google Sheets or Proxy.");
                
                const textData = await response.text();
                
                // If Google redirects to a login page, it returns HTML instead of CSV
                if (textData.trim().startsWith('<')) {
                    throw new Error("Received HTML. Sheet might not be fully public.");
                }

                Papa.parse(textData, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        processData(results.data, false);
                    }
                });

            } catch (error) {
                console.warn("Could not fetch live sheet, using demo data:", error);
                processData(fallbackData, true);
            }
        }

        function processData(data, isFallback) {
            lendersData = data;
            
            const loadingEl = document.getElementById('loading');
            if (isFallback) {
                loadingEl.innerHTML = "<span class='text-amber-600 font-medium'>Live sheet blocked by browser security. Showing demo data.</span>";
                // Hide the message after a few seconds
                setTimeout(() => { loadingEl.style.display = 'none'; }, 4000);
            } else {
                loadingEl.style.display = 'none';
            }
            
            document.getElementById('lendersContainer').classList.remove('hidden');
            renderLenderCards();
        }

        // Render Lender Checkboxes & Rate Sliders
        function renderLenderCards() {
            const container = document.getElementById('lendersContainer');
            container.innerHTML = '';

            lendersData.forEach((lender, index) => {
                // Clean up headers in case of trailing spaces in sheet
                const lenderName = lender["Lender Name"] || lender["Lender Name "] || "";
                const repaymentType = lender["Repayment Type"] || lender["Repayment Type "] || "Annualized";
                
                if(!lenderName.trim()) return; 
                
                const isAccelerated = repaymentType.toLowerCase().includes("accelerated");
                const typeColor = isAccelerated 
                                ? "bg-emerald-100 text-emerald-800 border-emerald-200" 
                                : "bg-amber-100 text-amber-800 border-amber-200";

                // Check first two by default to show immediate comparison
                const checkedAttr = (index < 2) ? "checked" : "";

                const html = `
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between p-4 bg-slate-50 border border-slate-200 rounded-xl gap-4 transition-all hover:border-indigo-300 hover:shadow-sm">
                        <div class="flex items-center gap-3 w-full sm:w-1/3">
                            <input type="checkbox" id="check_${index}" ${checkedAttr} class="w-5 h-5 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500 cursor-pointer" onchange="updateUI()">
                            <div>
                                <label for="check_${index}" class="font-semibold text-slate-800 block truncate cursor-pointer" title="${lenderName}">${lenderName}</label>
                                <span class="text-[11px] uppercase tracking-wider font-bold px-2 py-0.5 mt-1 inline-block rounded border ${typeColor}">
                                    ${repaymentType}
                                </span>
                            </div>
                        </div>
                        <div class="w-full sm:w-1/3">
                            <div class="flex justify-between mb-1">
                                <span class="text-xs font-medium text-slate-500">Interest Rate</span>
                                <span id="rateDisplay_${index}" class="text-xs font-bold text-slate-700">6.00%</span>
                            </div>
                            <input type="range" id="rate_${index}" min="2.00" max="10.00" step="0.01" value="6.00" class="slider-custom" oninput="updateRateDisplay(${index})">
                        </div>
                        <div class="text-right w-full sm:w-1/3">
                            <div class="text-xs text-slate-500">Repayment</div>
                            <div id="repaymentAmt_${index}" class="text-lg font-bold text-indigo-600">--</div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
            updateUI();
        }

        function updateRateDisplay(index) {
            const rate = document.getElementById(`rate_${index}`).value;
            document.getElementById(`rateDisplay_${index}`).innerText = `${parseFloat(rate).toFixed(2)}%`;
            updateUI();
        }

        // Core Calculation Logic
        function calculateMortgage(principal, annualRate, years, freq, type) {
            let monthlyRate = (annualRate / 100) / 12;
            let totalMonths = years * 12;
            
            let standardMonthlyPmt = (principal * monthlyRate) / (1 - Math.pow(1 + monthlyRate, -totalMonths));
            let actualPayment = 0;
            let periodsPerYear = 12;

            const safeType = type || "";

            // Calculate exact repayment amounts based on strategy
            if (freq === 'Weekly') {
                periodsPerYear = 52;
                if (safeType.toLowerCase().includes('accelerated')) {
                    actualPayment = standardMonthlyPmt / 4; 
                } else {
                    actualPayment = (standardMonthlyPmt * 12) / 52; 
                }
            } else if (freq === 'Fortnightly') {
                periodsPerYear = 26;
                if (safeType.toLowerCase().includes('accelerated')) {
                    actualPayment = standardMonthlyPmt / 2; 
                } else {
                    actualPayment = (standardMonthlyPmt * 12) / 26; 
                }
            } else { 
                actualPayment = standardMonthlyPmt;
            }

            // Amortization Schedule Generation
            let balance = principal;
            let totalInterest = 0;
            // Using a simplified daily-compounding approximation common in Australian mortgages
            let dailyRate = (annualRate / 100) / 365; 
            let daysPerPeriod = 365 / periodsPerYear;
            let periodRate = dailyRate * daysPerPeriod; 
            
            let periodsTaken = 0;
            let chartData = [];

            // Prevent infinite loop if payment doesn't cover interest
            if (actualPayment <= balance * periodRate) {
                 return { payment: actualPayment, totalInterest: 0, yearsTaken: years, chartData: [{year:0, balance:principal}, {year:years, balance:principal}] };
            }

            while (balance > 0.01 && periodsTaken < (years * periodsPerYear * 1.5)) {
                let interestPmt = balance * periodRate;
                let principalPmt = actualPayment - interestPmt;
                
                if (balance < principalPmt) {
                    principalPmt = balance;
                    actualPayment = principalPmt + interestPmt;
                }

                balance -= principalPmt;
                totalInterest += interestPmt;
                periodsTaken++;

                // Record data points less frequently for better chart performance
                if (periodsTaken % periodsPerYear === 0 || balance <= 0.01) {
                    chartData.push({
                        year: periodsTaken / periodsPerYear,
                        balance: Math.max(0, balance)
                    });
                }
            }

            // Always ensure the start point (Year 0) is there
            if (chartData.length === 0 || chartData[0].year !== 0) {
                chartData.unshift({ year: 0, balance: principal });
            }

            return {
                payment: actualPayment,
                totalInterest: totalInterest,
                yearsTaken: periodsTaken / periodsPerYear,
                chartData: chartData
            };
        }

        // Update User Interface and Charts
        function updateUI() {
            const principal = parseFloat(document.getElementById('loanAmt').value);
            const years = parseInt(document.getElementById('loanTerm').value);
            const freq = document.getElementById('freqSelect').value;

            document.getElementById('loanAmtDisplay').innerText = '$' + principal.toLocaleString();
            document.getElementById('loanTermDisplay').innerText = years + ' Yrs';

            let chartDatasets = [];
            let timeDatasets = { labels: [], data: [], bgColors: [] };

            // Premium Color Palette
            const colors = ['#4f46e5', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6', '#06b6d4', '#ef4444']; 

            let activeCount = 0;

            lendersData.forEach((lender, index) => {
                const checkbox = document.getElementById(`check_${index}`);
                if (!checkbox || !checkbox.checked) return;

                const rate = parseFloat(document.getElementById(`rate_${index}`).value);
                const type = lender["Repayment Type"] || lender["Repayment Type "];
                const lenderName = lender["Lender Name"] || lender["Lender Name "];
                
                const results = calculateMortgage(principal, rate, years, freq, type);

                document.getElementById(`repaymentAmt_${index}`).innerText = '$' + results.payment.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});

                const colorIndex = activeCount % colors.length;

                chartDatasets.push({
                    label: lenderName,
                    data: results.chartData.map(d => ({ x: d.year, y: d.balance })),
                    borderColor: colors[colorIndex],
                    backgroundColor: colors[colorIndex] + '20',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0,
                    pointHitRadius: 10
                });

                timeDatasets.labels.push(lenderName);
                timeDatasets.data.push(results.yearsTaken.toFixed(1));
                timeDatasets.bgColors.push(colors[colorIndex]);
                
                activeCount++;
            });

            updateCharts(chartDatasets, timeDatasets);
        }

        // Render Chart.js Visualizations
        function updateCharts(amortizationData, timeData) {
            Chart.defaults.font.family = "'Inter', sans-serif";
            Chart.defaults.color = '#64748b';

            // Amortization Area Chart
            const ctxAmort = document.getElementById('amortizationChart').getContext('2d');
            if (amortizationChartInst) amortizationChartInst.destroy();
            
            amortizationChartInst = new Chart(ctxAmort, {
                type: 'line',
                data: { datasets: amortizationData },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: { 
                            type: 'linear', 
                            title: { display: true, text: 'Years' },
                            grid: { display: false }
                        },
                        y: { 
                            title: { display: true, text: 'Remaining Balance' }, 
                            beginAtZero: true,
                            ticks: { callback: function(value) { return '$' + (value/1000) + 'k'; } }
                        }
                    },
                    plugins: { 
                        legend: { position: 'top', align: 'end', labels: { usePointStyle: true, boxWidth: 8 } },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) { label += ': '; }
                                    if (context.parsed.y !== null) {
                                        label += new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(context.parsed.y);
                                    }
                                    return label;
                                }
                            }
                        }
                    }
                }
            });

            // Time Saved Bar Chart
            const ctxTime = document.getElementById('timeChart').getContext('2d');
            if (timeChartInst) timeChartInst.destroy();

            timeChartInst = new Chart(ctxTime, {
                type: 'bar',
                data: {
                    labels: timeData.labels,
                    datasets: [{
                        label: 'Years to Payoff',
                        data: timeData.data,
                        backgroundColor: timeData.bgColors,
                        borderRadius: 6,
                        barThickness: 'flex',
                        maxBarThickness: 40
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    scales: { 
                        x: { 
                            beginAtZero: true, 
                            title: { display: true, text: 'Years' },
                            grid: { borderDash: [2, 4] }
                        },
                        y: { grid: { display: false } }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        // Share/Copy function (IFrame compatible)
        function shareDashboard() {
            let summary = `Loan Dashboard Summary:\nLoan Amount: ${document.getElementById('loanAmtDisplay').innerText}\nFrequency: ${document.getElementById('freqSelect').value}\n\n`;
            
            lendersData.forEach((lender, index) => {
                const checkbox = document.getElementById(`check_${index}`);
                if (checkbox && checkbox.checked) {
                    const rate = document.getElementById(`rateDisplay_${index}`).innerText;
                    const pmt = document.getElementById(`repaymentAmt_${index}`).innerText;
                    const type = lender["Repayment Type"] || lender["Repayment Type "];
                    const lenderName = lender["Lender Name"] || lender["Lender Name "];
                    summary += `${lenderName} (${type} @ ${rate}): ${pmt} per period\n`;
                }
            });

            // Fallback clipboard method for iframes
            const textArea = document.createElement("textarea");
            textArea.value = summary;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('Failed to copy text', err);
            }
            
            document.body.removeChild(textArea);
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // Run setup
        window.onload = init;
    </script>
</body>
</html>
